<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta name="theme-color" content="#0f766e">
  <title>Mongoyia Offline</title>
  <style>
    html, body {
      margin: 0;
      min-height: 100%;
      font-family: Arial, Helvetica, sans-serif;
      color: #17202a;
      background: #f7faf9;
    }
    main {
      width: min(520px, calc(100% - 32px));
      margin: 16vh auto 0;
      padding: 28px;
      border: 1px solid #d8e4e0;
      border-radius: 8px;
      background: #fff;
      box-shadow: 0 8px 24px rgba(23, 32, 42, 0.08);
    }
    h1 {
      margin: 0 0 12px;
      font-size: 26px;
      line-height: 1.25;
    }
    p {
      margin: 0 0 18px;
      line-height: 1.6;
      color: #4b5f5b;
    }
    a {
      display: inline-block;
      color: #0f766e;
      font-weight: 700;
      text-decoration: none;
    }
  </style>
</head>
<body>
  <main>
    <h1>Mongoyia is offline</h1>
    <p>Your connection is unavailable. Recently opened pages may still work when they are cached.</p>
    <a href="/">Try again</a>
  </main>
</body>
</html>
